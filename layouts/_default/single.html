{{ define "main" }}
    <div style="background: #111; border: 2px solid var(--hot-pink); border-radius: var(--inner-radius); padding: 20px;">
        <h1 style="color: var(--neon-yellow); text-transform: uppercase; margin-top: 0; border-bottom: 2px dashed #333; padding-bottom: 10px;">
            {{ .Title }}
        </h1>
        <div style="line-height: 1.6; color: #eee; font-size: 0.95rem;">
            {{ .Content }}
        </div>
    </div>
{{ end }}
