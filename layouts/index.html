{{ define "main" }}
<style>
    /* Specific styles just for the homepage layout */
    
    /* --- TOP ART BANNER WITH KITTY OVERLAYS --- */
    
    .top-art-banner {
        border: 4px solid var(--hot-pink);
        border-radius: var(--inner-radius);
        overflow: hidden;
        margin-bottom: 25px;
        background: #000;
        position: relative; /* Essential for absolute positioning of the bars */
        padding-top: 15px; /* Gives space for the top kittybar */
        padding-bottom: 15px; /* Gives space for the bottom kittybar */
    }

    .kitty-bar-overlay {
        position: absolute;
        left: 0;
        width: 100%;
        height: auto;
        display: block;
        z-index: 10; /* Ensures it sits on top of the art */
    }
    
    .kitty-bar-top { top: -2px; }
    .kitty-bar-bottom { bottom: -2px; }

    /* --- THE LAYERED STICKER BLOCK (Container update) --- */
    .layered-sticker-block {
        display: block;
        text-decoration: none;
        margin-bottom: 35px;
        position: relative;
        border: none;
        background: transparent;
        padding: 0;
        box-shadow: none;
        
        /* Transition still allowed for hover effect on images */
        transition: all 0.2s ease;
    }
    
    /* Visual changes on hover apply to the images, not the container */
    .layered-sticker-block:hover img {
        filter: brightness(1.2) drop-shadow(0 0 10px rgba(255, 255, 255, 0.5));
    }

    /* THE STACKING CONTAINER (Targeted updates) */
    .layered-image-container {
        position: relative;
        width: 100%;
        text-align: center;
        /* Padding removed to ensure full-bleed to container edges */
        padding-top: 0; 
        padding-bottom: 0;
    }

    /* Base Image (Chabby) targeted styling */
    .layered-base-img {
        width: 100%;
        max-width: 600px;
        border-radius: 8px;
        border: 2px solid #333; /* Keeps a small subtle border on the *art*, not the container */
        display: inline-block;
    }

    /* Welcome Sticker (targeted) */
    .layered-welcome {
        position: absolute;
        top: -20px; /* Adjusting top/left slightly so it feels like it floats outside the container */
        left: -5%;
        max-width: 40%;
        transform: rotate(-deg); /* Tilted sticker look */
        z-index: 20; /* Above base image */
        filter: drop-shadow(3px 3px 0px #000); /* Sticker drop-shadow */
    }
    /* NEW: Label01 Background Layer */
    .layered-label {
        position: absolute;
        top: -7%;
        left: -7%;
        width: 50%;
        max-width: 320px;
        z-index: 15;           /* Behind welcome.gif */
        border-radius: 1px;
        box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.6),
                    inset 0 0 8px rgba(255,255,255,0.3);
        border: 1x solid #333;
        background: #000000;
        padding: 4px;
        transform: rotate(-8deg);   /* Negative = counter-clockwise tilt */
    /* Enter Sticker (targeted) */
    }
    .layered-enter {
        position: absolute;
        bottom: 25px; /* Adjusting bottom slightly for outside-of-container feel */
        left: 30%;
        transform: translateX(-50%); /* perfectly centered */
        max-width: 200%;
        z-index: 40; /* Above base image */
        filter: drop-shadow(2px 2px 0px #000);
    }

    /* --- MODULAR PRICE GRID --- */
    .comm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .tier-box { background: #111; border: 2px solid var(--hot-pink); border-radius: var(--inner-radius); padding: 12px; text-align: center; transition: 0.3s; }
    .tier-box:hover { box-shadow: 0 0 15px var(--hot-pink); transform: translateY(-5px); }
    .tier-box img { width: 100%; border: 1px solid #333; border-radius: 8px; margin-bottom: 10px; }

    /* --- ART PROGRESS --- */
    .workbench { background: #000; border: 2px dashed var(--hot-pink); border-radius: var(--inner-radius); padding: 15px; margin-top: 25px; }
    .progress-container { background: #222; border: 1px solid var(--hot-pink); height: 28px; border-radius: 50px; margin-top: 10px; overflow: hidden; }
    .progress-fill { background: linear-gradient(to right, #660066, var(--hot-pink)); height: 100%; }

</style>

<div class="top-art-banner">
    <img src="/images/kittybar.gif" class="kitty-bar-overlay kitty-bar-top" alt="Animated Kitty Border Top">
    <img src="/images/Image02.jpg" alt="Art Banner" style="width: 100%;">
    <img src="/images/kittybar.gif" class="kitty-bar-overlay kitty-bar-bottom" alt="Animated Kitty Border Bottom">
</div>

<a href="/prices" class="layered-sticker-block">
    <div class="layered-image-container">
        <img src="/images/label01.png" class="layered-label" alt="Label Background">
        <img src="/images/welcome.gif" class="layered-welcome" alt="Welcome">
        <img src="/images/welcomechabby.jpg" class="layered-base-img" alt="Commission info + examples">
        
        <img src="/images/enter.gif" class="layered-enter" alt="Enter">
    </div>
</a>

<div class="comm-grid">
    <div class="tier-box">
        <div style="font-weight: bold; margin-bottom: 8px; color: var(--hot-pink);">COLOR SKETCH</div>
        <img src="/images/Image03.jpg">
        <div style="font-weight: bold; color: var(--neon-yellow);">$35.00</div>
    </div>
    <div class="tier-box">
        <div style="font-weight: bold; margin-bottom: 8px; color: var(--hot-pink);">FULL RENDER</div>
        <img src="/images/Image06.jpg">
        <div style="font-weight: bold; color: var(--neon-yellow);">$85.00</div>
    </div>
</div>

<div class="workbench">
    <div style="font-weight: bold; color: var(--hot-pink);">ART PROGRESS:</div>
    <p style="font-size: 0.8rem; color: #ccc;">Current Project: Illustration for @GalileoCat</p>
    <div class="progress-container">
        <div class="progress-fill" style="width: 75%;"></div>
    </div>
</div>


{{ end }}
